<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PurpleConnect 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">Purple<span>Connect</span></h1>
            <div class="status-dot"></div>
        </header>

        <main>
            <!-- Botón de Proximidad 2026 -->
            <div class="card pulse-purple" id="proximity-btn">
                <div class="beam-icon">📡</div>
                <p>Acerca otro iPhone para conectar</p>
            </div>

            <!-- Panel de Sincronización WhatsApp -->
            <section class="whatsapp-section">
                <h3>Sincronización WhatsApp</h3>
                <div id="wa-setup">
                    <button id="btn-sync-wa" class="btn-purple-main">Vincular mi WhatsApp</button>
                    <div id="qrcode-container" class="hidden">
                        <p>Escanea este código desde "Dispositivos Vinculados"</p>
                        <div class="qr-mock">QR GENERADO</div>
                    </div>
                </div>

                <!-- Lista de Mensajes y Estados (Aparece tras vincular) -->
                <div id="chat-list" class="hidden">
                    <div class="chat-item online">
                        <div class="avatar">👤</div>
                        <div class="chat-info">
                            <h4>Contacto VIP</h4>
                            <p>En línea - Grabando video...</p>
                        </div>
                    </div>
                    <div class="chat-item offline">
                        <div class="avatar">👤</div>
                        <div class="chat-info">
                            <h4>Usuario 2</h4>
                            <p>Desconectado hace 5 min</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active">Chats</button>
            <button class="nav-btn" id="pay-module">Pagos</button>
            <button class="nav-btn">Ajustes</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
