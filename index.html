<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PurpleConnect 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">Purple<span>Connect</span></h1>
            <div class="status-dot"></div>
        </header>

        <main>
            <div class="card pulse-purple" id="proximity-btn">
                <i class="icon-beam"></i>
                <p>Acerca otro iPhone para conectar</p>
            </div>

            <section class="whatsapp-preview">
                <h3>Mensajes Recientes</h3>
                <div class="chat-item">
                    <div class="avatar"></div>
                    <div class="text">
                        <h4>WhatsApp Sync</h4>
                        <p>Conectando con estados en línea...</p>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="active">Chats</button>
            <button>Contactos</button>
            <button id="pay-link">Pagos</button>
        </nav>
    </div>
</body>
                  </html>
